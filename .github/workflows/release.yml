name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2022
            command: npm run build:win
            artifact-name: TTime-windows
            artifact-path: |
              dist/*.exe
              dist/*.zip
              dist/*.yml
          - name: macOS
            os: macos-13
            command: npm run build:mac
            artifact-name: TTime-macos
            artifact-path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
          - name: Linux
            os: ubuntu-22.04
            command: npm run build:linux:ci
            artifact-name: TTime-linux
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
              dist/*.yml

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build artifacts
        run: ${{ matrix.command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-path }}
